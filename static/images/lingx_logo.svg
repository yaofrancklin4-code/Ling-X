<svg width="48" height="48" viewBox="0 0 48 48" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <!-- Fond circulaire dégradé or-argent -->
    <defs>
        <linearGradient id="gradientFond" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradientTexte" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#007FFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#003F7F;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Cercle de fond -->
    <circle cx="24" cy="24" r="22" fill="url(#gradientFond)" stroke="#007FFF" stroke-width="2"/>

    <!-- Lettre L -->
    <text x="12" y="32" font-family="'Baloo 2', cursive" font-size="28" font-weight="900" fill="url(#gradientTexte)" text-anchor="middle">L</text>

    <!-- Lettre X -->
    <text x="32" y="32" font-family="'Baloo 2', cursive" font-size="28" font-weight="900" fill="#FF4500" text-anchor="middle">X</text>

    <!-- Élément décoratif : petite couronne pour Baoulé -->
    <path d="M 24 8 L 26 12 L 30 12 L 27 14 L 28 18 L 24 15 L 20 18 L 21 14 L 18 12 L 22 12 Z" fill="#FFD700" stroke="#003F7F" stroke-width="0.5"/>
</svg>